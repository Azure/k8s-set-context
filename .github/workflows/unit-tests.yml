name: Run Unit Tests
on:
   pull_request:
      branches:
         - main
         - 'releases/*'
   push:
      branches:
         - main
         - 'releases/*'

jobs:
   unit-test:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - name: Run Unit Tests
           run: |
              npm install
              npm test
